name: Sync Upstream (hermes-agent)

on:
  schedule:
    # 每天 UTC 时间 0 点运行一次（相当于北京时间早上 8 点）
    - cron: '0 0 * * *'
  workflow_dispatch:   # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v6
        with:
          # 拉取完整历史，便于合并
          fetch-depth: 0
          # 使用默认的 GITHUB_TOKEN 进行后续推送
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure upstream
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream

      - name: Merge upstream changes (main branch)
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"        
          git checkout main
          git merge upstream/main --allow-unrelated-histories --no-edit
        # 如果出现冲突，GitHub Actions 会失败并显示日志

      - name: Push back to your fork
        run: git push origin main
